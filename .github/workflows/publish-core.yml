name: Publish ghost-blocks to npm

# Fires when a tag like `ghost-blocks@0.3.1` is pushed. Publishes the core
# library with an npm provenance attestation (required for n8n verification
# from May 2026).
on:
  push:
    tags:
      - 'ghost-blocks@*'

permissions:
  contents: read
  id-token: write   # Needed for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=ghost-blocks

      - name: Run unit tests
        run: |
          cd packages/core
          npx tsx --test test/text-parser.test.ts test/builder.test.ts test/auth.test.ts test/url-validator.test.ts test/oembed.test.ts test/schema.test.ts

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="ghost-blocks@$(node -p "require('./packages/core/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --workspace=ghost-blocks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
