name: Publish n8n-nodes-ghost-blocks-cloud to npm

# Fires when a tag like `n8n-nodes-ghost-blocks-cloud@0.1.0` is pushed.
# Publishes with npm provenance (required for n8n verification).
on:
  push:
    tags:
      - 'n8n-nodes-ghost-blocks-cloud@*'

permissions:
  contents: read
  id-token: write   # Needed for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build cloud node
        run: npm run build --workspace=n8n-nodes-ghost-blocks-cloud

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="n8n-nodes-ghost-blocks-cloud@$(node -p "require('./packages/n8n-node-cloud/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --workspace=n8n-nodes-ghost-blocks-cloud --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
