name: Publish n8n-nodes-ghost-blocks to npm

# Fires when a tag like `n8n-nodes-ghost-blocks@0.4.4` is pushed. Publishes the
# n8n community node with an npm provenance attestation (required for n8n
# verification from May 2026).
on:
  push:
    tags:
      - 'n8n-nodes-ghost-blocks@*'

permissions:
  contents: read
  id-token: write   # Needed for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build core (n8n node bundles its compiled JS)
        run: npm run build --workspace=ghost-blocks

      - name: Build n8n node (esbuild bundle — no runtime deps)
        run: npm run build --workspace=n8n-nodes-ghost-blocks

      - name: Run smoke tests
        run: |
          cd packages/n8n-node
          node --test test/smoke.test.js

      - name: Verify bundle has no external requires (other than n8n-workflow)
        run: |
          cd packages/n8n-node
          # Check that the bundle doesn't require ghost-blocks or any third-party package
          if grep -E "require\(['\"](?!n8n-workflow)[^./\"]+['\"]\)" dist/nodes/GhostBlocks/GhostBlocks.node.js; then
            echo "ERROR: bundled file still requires external packages"
            exit 1
          fi
          echo "✓ Bundle is self-contained"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="n8n-nodes-ghost-blocks@$(node -p "require('./packages/n8n-node/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --workspace=n8n-nodes-ghost-blocks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
